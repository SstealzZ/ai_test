server:
  port: 8080

spring:
  application:
    name: cert-alert

  datasource:
    url: jdbc:h2:file:./data/certalert-db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  sql:
    init:
      mode: always

  mail:
    host: localhost
    port: 1025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

# Certificate Alert Configuration
cert-alert:
  jwt:
    secret: "certalert-dev-secret-key-that-is-long-enough-for-hmac-sha256"
  threshold:
    default-days: 30
  scheduler:
    check-cron: "0 0 8 * * ?"
  alert:
    email:
      enabled: false
      from: cert-alert@example.com
      admin-email: admin@example.com

logging:
  level:
    com.certalert: DEBUG
    org.springframework.security: DEBUG