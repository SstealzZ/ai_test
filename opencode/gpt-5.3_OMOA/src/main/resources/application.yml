spring:
  datasource:
    url: jdbc:h2:mem:tlsalertdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  alert:
    default-threshold-days: 30
    scan-delay-ms: 300000

server:
  error:
    include-message: always
