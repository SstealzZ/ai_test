spring.application.name=cert-watcher

# H2 in-memory datasource
spring.datasource.url=jdbc:h2:mem:certwatcher;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Multipart upload limit
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Spring Authorization Server JWT issuer URI (self)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080

# Expiry alert scheduler: default 08:00 daily
certwatcher.scheduler.cron=0 0 8 * * *

# Logging
logging.level.com.certwatcher=DEBUG
logging.level.org.springframework.security=INFO
