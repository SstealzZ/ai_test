<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>CertWatcher – Login</title>
    <style>
        body { font-family: sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; background:#f0f2f5; }
        .box { background:#fff; padding:2rem; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.15); width:320px; }
        h2 { margin-top:0; color:#333; }
        label { display:block; margin-top:1rem; font-size:.875rem; color:#555; }
        input[type=text], input[type=password] { width:100%; box-sizing:border-box; padding:.5rem; margin-top:.25rem; border:1px solid #ccc; border-radius:4px; }
        button { margin-top:1.25rem; width:100%; padding:.6rem; background:#2563eb; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:1rem; }
        button:hover { background:#1d4ed8; }
        .error { color:#dc2626; font-size:.875rem; margin-top:.75rem; }
        .success { color:#166534; background:#dcfce7; border:1px solid #86efac; font-size:.875rem; margin-top:.75rem; padding:.4rem .6rem; border-radius:4px; }
        .hint { margin-top:1rem; font-size:.75rem; color:#888; }
    </style>
</head>
<body>
<div class="box">
    <h2>🔐 CertWatcher</h2>
    <form th:action="@{/login}" method="post">
        <label>Username
            <input type="text" name="username"/>
        </label>
        <label>Password
            <input type="password" name="password"/>
        </label>
        <button type="submit">Sign in</button>
        <p class="error"   th:if="${param.error}">Invalid credentials.</p>
        <p class="success" th:if="${param.logout}">You have been signed out.</p>
    </form>
    <p class="hint">Demo accounts: alice / bob (group: ops) · carol / dave (group: dev)<br/>Password: <code>password</code></p>
</div>
</body>
</html>
